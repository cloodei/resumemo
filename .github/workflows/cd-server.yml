name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "packages/shared/**"
      - "deploy/ec2/deploy.sh"
      - "deploy/nginx/api.conf"
      - "docker-compose.prod.yml"
      - ".dockerignore"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/cd-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/resumemo-api:latest
          # cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/resumemo-api:latest
          # cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/resumemo-api:latest,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Copy deploy assets to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy/nginx/api.conf,deploy/ec2/deploy.sh"
          target: "/opt/resumemo"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/resumemo /opt/resumemo/deploy/ec2 /opt/resumemo/deploy/nginx
            chmod +x /opt/resumemo/deploy/ec2/deploy.sh
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            API_IMAGE_TAG=latest /opt/resumemo/deploy/ec2/deploy.sh
