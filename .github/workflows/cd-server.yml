name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "core/**"
      - "services/pipeline/**"
      - "deploy/ec2/**"
      - "deploy/nginx/**"
      - "docker-compose.prod.yml"
      - ".dockerignore"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/cd-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/resumemo-api:latest
          # cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/resumemo-api:latest
          # cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/resumemo-api:latest,mode=max

      - name: Build and push pipeline image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/pipeline/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/resumemo-pipeline:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Package deploy assets
        run: tar -czf server-deploy-assets.tar.gz docker-compose.prod.yml deploy/ec2/deploy.sh deploy/nginx/api.conf

      - name: Copy deploy assets to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "server-deploy-assets.tar.gz"
          target: "/tmp/resumemo-server-upload"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/resumemo /tmp/resumemo-server-upload
            tar -xzf /tmp/resumemo-server-upload/server-deploy-assets.tar.gz -C /tmp/resumemo-server-upload
            rm -f /opt/resumemo/docker-compose.prod.yml
            rm -rf /opt/resumemo/deploy/ec2 /opt/resumemo/deploy/nginx
            mkdir -p /opt/resumemo/deploy/ec2 /opt/resumemo/deploy/nginx
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            cp /tmp/resumemo-server-upload/docker-compose.prod.yml /opt/resumemo/docker-compose.prod.yml
            cp /tmp/resumemo-server-upload/deploy/ec2/deploy.sh /opt/resumemo/deploy/ec2/deploy.sh
            cp /tmp/resumemo-server-upload/deploy/nginx/api.conf /opt/resumemo/deploy/nginx/api.conf
            chmod +x /opt/resumemo/deploy/ec2/deploy.sh
            GHCR_OWNER=${{ github.repository_owner }} API_IMAGE_TAG=latest PIPELINE_IMAGE_TAG=latest /opt/resumemo/deploy/ec2/deploy.sh
            rm -rf /tmp/resumemo-server-upload
