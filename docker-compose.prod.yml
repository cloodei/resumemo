services:
  nginx:
    image: nginx:1.29.1-alpine-slim
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/${GHCR_OWNER:-cloodei}/resumemo-api:${API_IMAGE_TAG:-latest}
    env_file:
      - ./env/api.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  pipeline:
    image: ghcr.io/${GHCR_OWNER:-cloodei}/resumemo-pipeline:${PIPELINE_IMAGE_TAG:-latest}
    env_file: ./env/pipeline.env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
